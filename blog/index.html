---
layout: default
title: Shashank Srivastava's Blog Posts
---
{% include analytics.html %}
	<h1>{{ page.title }}</h1>
	<ul class="posts">

	  {% for post in site.posts %}
	    <li><span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a>{{ post.image }}</li>
	  {% endfor %}
	</ul>
